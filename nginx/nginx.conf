events {}

http {
    map $host $host_name {
        default "localhost";
    }

    # -----------------------------
    # HTTP → HTTPS Redirect
    # -----------------------------
    server {
        listen 80;
        server_name _;

        location /health {
            return 200 "OK\n";
        }

        location / {
            return 301 https://$host_name$request_uri;
        }
    }

    # -----------------------------
    # Public HTTPS Server
    # -----------------------------
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/certificats/certif.pem;
        ssl_certificate_key /etc/certificats/certif-key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /health {
            return 200 "OK\n";
        }

        # ---------------------------
        # Frontend — static assets (bypass anubis for perf)
        # ---------------------------
        location /static/ {
            proxy_pass http://front:3000/static/;
            proxy_set_header Host $host_name;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /manifest.webmanifest {
            proxy_pass http://front:3000/manifest.webmanifest;
            proxy_set_header Host $host_name;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /sw.js {
            proxy_pass http://front:3000/sw.js;
            proxy_set_header Host $host_name;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---------------------------
        # API — direct to core (fetch() from browser can't solve anubis PoW)
        # ---------------------------
        location /api/ {
            proxy_pass http://core:5002/api/;
            proxy_set_header Host $host_name;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------------------------
        # WebSocket — direct to core (long-lived, skip anubis)
        # ---------------------------
        location /ws {
            proxy_pass http://core:5002;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Block internal JWT route from the outside
        location /jwt/ {
            return 403;
        }

        # ---------------------------
        # Frontend — catch-all (SPA)
        # ---------------------------
        location / {
            proxy_pass http://front:3000;
            proxy_set_header Host $host_name;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}