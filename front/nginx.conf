server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # All unknown paths fall back to index.html (React Router handles routing)
    location / {
        try_files $uri $uri/index.html /index.html;
    }

    # Healthcheck endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
    }
}
