services:
    nginx:
        build: ./nginx
        restart: always
        container_name: reverse-proxy
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./certificats:/etc/certificats
        depends_on:
            core:
                condition: service_healthy
            front:
                condition: service_healthy
            anubis:
                condition: service_started
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/health"]
            interval: 30s
            timeout: 5s
        networks: [public]

    database:
        build: ./database
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: appdb
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
            interval: 10s
            retries: 5
        networks: [internal]

    core:
        build: ./back
        restart: always
        depends_on:
            database:
                condition: service_healthy
        environment:
            - DB_URL=postgresql://postgres:${POSTGRES_PASSWORD}@database:5432/appdb
            - ADMIN_API_KEY=${ADMIN_API_KEY}
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks: [internal, public]

    front:
        build: ./front
        restart: always
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks: [public]

    anubis:
        build: ./anubis
        container_name: anubis
        restart: always
        environment:
            TARGET: "http://core:5002"
        volumes:
            - ./anubis/policy.yaml:/policy.yaml
        depends_on:
            core:
                condition: service_healthy
        expose:
            - "8080"
        networks: [public]

networks:
    internal:
        internal: true
    public:

volumes:
    postgres_data:
